name: Build A22 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Prepare
        run: |
          sudo apt update
          sudo apt install -y git wget unzip tar bc bison flex libssl-dev cpio curl python3 android-sdk-libsparse-utils

      - name: Extract Source
        run: |
          wget https://github.com/naat4youu/kernel-release-a225f/releases/download/skibidi1/SM-A225F_EUR_13_Opensource.zip -O source.zip
          unzip source.zip

          TAR=$(find . -name "Kernel.tar.gz" | head -n 1)
          tar -xzf "$TAR"

          for d in $(find . -type d); do
            if [ -f "$d/Makefile" ] && [ -d "$d/arch" ] && [ -d "$d/drivers" ]; then
              echo "KERNEL_DIR=$d" >> $GITHUB_ENV
              break
            fi
          done

      - name: Setup GCC Toolchain
        run: |
          cd $KERNEL_DIR
          mkdir gcc64
          cd gcc64
          git clone --depth=1 https://github.com/mvaisakh/gcc-arm64.git .
          echo "GCC64=$(pwd)/bin/aarch64-linux-gnu-" >> $GITHUB_ENV

      - name: Setup Clang
        run: |
          cd $KERNEL_DIR
          mkdir clang
          cd clang
          bash <(curl -s https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman) -S=10032024
          TC=$(find . -type d -name "*clang*" | head -n 1)
          echo "CLANG=$(pwd)/$TC/bin" >> $GITHUB_ENV

      - name: Integrate KernelSU
        run: |
          cd $KERNEL_DIR
          curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

      - name: Integrate SukiSU (FIXED)
        run: |
          cd $KERNEL_DIR
          git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra.git

          mkdir -p drivers/sukisu
          cp -r SukiSU-Ultra/kernel/* drivers/sukisu/

          if ! grep -q "sukisu" drivers/Kconfig; then
            echo 'source "drivers/sukisu/Kconfig"' >> drivers/Kconfig
          fi

          if ! grep -q "sukisu" drivers/Makefile; then
            echo 'obj-$(CONFIG_KSU) += sukisu/' >> drivers/Makefile
          fi

      - name: Detect Defconfig
        run: |
          cd $KERNEL_DIR
          DEF=$(ls arch/arm64/configs | head -n 1)
          echo "DEFCONFIG=$DEF" >> $GITHUB_ENV

      - name: Set Version
        run: |
          DATE=$(date +%Y%m%d)
          echo "KERNEL_NAME=natkernel_${DATE}_r${GITHUB_RUN_NUMBER}" >> $GITHUB_ENV

      - name: Build Kernel (HYBRID GCC + CLANG)
        run: |
          cd $KERNEL_DIR
          export PATH=$CLANG:$PATH
          export ARCH=arm64
          export SUBARCH=arm64

          make O=out $DEFCONFIG

          echo 'CONFIG_LOCALVERSION="-natkernel-testing"' >> out/.config
          echo 'CONFIG_KSU=y' >> out/.config

          make -j$(nproc) O=out \
            CC=clang \
            LD=ld.lld \
            CROSS_COMPILE=$GCC64 \
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-

      - name: Pack boot.img
        run: |
          cd $KERNEL_DIR
          IMG=$(find out -name "Image.gz-dtb" | head -n 1)
          mkdir boot
          cp $IMG boot/
          cd boot
          echo "ramdisk" > ramdisk.cpio
          gzip ramdisk.cpio
          mkbootimg --kernel Image.gz-dtb --ramdisk ramdisk.cpio.gz --output ${KERNEL_NAME}.img || true
          echo "BOOT=$(pwd)/${KERNEL_NAME}.img" >> $GITHUB_ENV

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: natkernel
          path: ${{ env.BOOT }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.KERNEL_NAME }}
          name: ${{ env.KERNEL_NAME }}
          files: ${{ env.BOOT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
