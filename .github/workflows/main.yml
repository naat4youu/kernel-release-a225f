name: Build A22 Kernel

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Prepare
        run: |
          sudo apt update
          sudo apt install -y git wget unzip tar bc bison flex libssl-dev cpio curl python3 clang lld

      - name: Extract Source
        run: |
          wget https://github.com/naat4youu/kernel-release-a225f/releases/download/skibidi1/SM-A225F_EUR_13_Opensource.zip -O source.zip
          unzip source.zip

          TAR=$(find . -name "Kernel.tar.gz" | head -n 1)
          tar -xzf "$TAR"

          for d in $(find . -type d); do
            if [ -f "$d/Makefile" ] && [ -d "$d/arch" ] && [ -d "$d/drivers" ]; then
              echo "KERNEL_DIR=$d" >> $GITHUB_ENV
              break
            fi
          done

      - name: Force Clean Samsung Toolchain
        run: |
          cd $KERNEL_DIR
          find . -type f -name Makefile -exec sed -i 's|../toolchain/.*||g' {} +

      - name: Setup Clang Proper
        run: |
          echo "CLANG_PATH=$(which clang)" >> $GITHUB_ENV
          echo "LD_PATH=$(which ld.lld)" >> $GITHUB_ENV

      - name: Integrate KernelSU
        run: |
          cd $KERNEL_DIR
          curl -LSs https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh | bash -

      - name: Integrate SukiSU
        run: |
          cd $KERNEL_DIR
          git clone --depth=1 https://github.com/SukiSU-Ultra/SukiSU-Ultra.git
          mkdir -p drivers/sukisu
          cp -r SukiSU-Ultra/kernel/* drivers/sukisu/

          echo 'source "drivers/sukisu/Kconfig"' >> drivers/Kconfig
          echo 'obj-$(CONFIG_KSU) += sukisu/' >> drivers/Makefile

      - name: Detect Defconfig
        run: |
          cd $KERNEL_DIR
          DEF=$(ls arch/arm64/configs | head -n 1)
          echo "DEFCONFIG=$DEF" >> $GITHUB_ENV

      - name: Build Kernel (LLVM ONLY)
        run: |
          cd $KERNEL_DIR
          export ARCH=arm64
          export SUBARCH=arm64

          make O=out $DEFCONFIG

          echo 'CONFIG_LOCALVERSION="-natkernel-testing"' >> out/.config
          echo 'CONFIG_KSU=y' >> out/.config
          sed -i 's/CONFIG_CC_STACKPROTECTOR_STRONG=y/CONFIG_CC_STACKPROTECTOR_NONE=y/g' out/.config

          make -j$(nproc) O=out \
            CC=clang \
            LD=ld.lld \
            LLVM=1 \
            LLVM_IAS=1

      - name: Pack boot.img
        run: |
          cd $KERNEL_DIR
          IMG=$(find out -name "Image.gz-dtb" | head -n 1)
          mkdir boot
          cp $IMG boot/
          cd boot
          echo "ramdisk" > ramdisk.cpio
          gzip ramdisk.cpio
          mkbootimg --kernel Image.gz-dtb --ramdisk ramdisk.cpio.gz --output natkernel.img || true
          echo "BOOT=$(pwd)/natkernel.img" >> $GITHUB_ENV

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: natkernel
          path: ${{ env.BOOT }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: natkernel-${{ github.run_number }}
          name: natkernel-${{ github.run_number }}
          files: ${{ env.BOOT }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
